name: Build e publica o site

# O gerador de posts (Creative Studio) faz push dos artigos .md em /blog/.
# Este workflow renderiza esses .md em HTML e publica o site no GitHub Pages.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# uma publicação por vez; se vierem dois posts seguidos, vale a última
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Renderiza o blog (.md -> HTML)
        run: |
          npm install marked@15.0.7 --no-save --no-audit --no-fund
          node scripts/build-blog.mjs
          rm -rf node_modules package-lock.json

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
